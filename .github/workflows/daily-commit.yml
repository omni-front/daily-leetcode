name: Daily Coding Practice

on:
  schedule:
    # Multiple triggers — schedule.py decides whether to actually commit
    - cron: '15 7 * * 1-5'   # weekday morning
    - cron: '42 10 * * 1-5'  # weekday mid-morning
    - cron: '5 14 * * 1-5'   # weekday afternoon
    - cron: '30 9 * * 6'     # saturday (rare)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decide commit behavior
        id: plan
        run: python3 scripts/schedule.py

      - name: Generate daily practice
        if: steps.plan.outputs.do_commit == 'true'
        run: |
          COMMIT_COUNT="${{ steps.plan.outputs.commit_count }}"
          for i in $(seq 1 "$COMMIT_COUNT"); do
            python scripts/generate.py
          done

      - name: Commit and push
        if: steps.plan.outputs.do_commit == 'true'
        run: |
          git config user.name "omni-front"
          git config user.email "omni-front@users.noreply.github.com"
          git add -A
          MSG="${{ steps.plan.outputs.commit_msg }}"
          git commit -m "$MSG" || echo "No changes"
          git push
